name: mobile_app
description: Event management app (customer + provider)
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  # 🌐 NETWORK + STORAGE
  http: ^0.13.6
  shared_preferences: ^2.2.2

  # 📸 MEDIA
  image_picker: ^1.0.4

  # 💳 PAYMENTS
  razorpay_flutter: ^1.3.6

  # 🔥 REAL-TIME
  socket_io_client: ^2.0.0

  # 🌍 ✅ LOCALIZATION (FIXED)
  flutter_localizations:
    sdk: flutter

  # 🔔 UTILITIES
  fluttertoast: ^8.2.4

  # ✅ AUTH
  google_sign_in: ^6.2.1
  firebase_auth: ^4.17.0
  firebase_core: ^2.24.2
  geolocator: ^12.0.0
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
